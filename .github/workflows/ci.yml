name: CI

# PR validation: typecheck/build the frontend, smoke-import the backend, and
# verify both Docker images build (no push). Keeps `main` always deployable.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  backend:
    name: Backend (import smoke + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install package
        run: pip install .[dev]
      - name: Import smoke test
        run: python -c "import app.main; print('app.main imported OK')"
      - name: Run tests (if any)
        run: |
          if compgen -G "test_*.py" > /dev/null || [ -d tests ]; then
            pytest -q
          else
            echo "No tests found — skipping."
          fi

  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
