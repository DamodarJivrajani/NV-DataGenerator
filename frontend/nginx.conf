server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers for a public-facing SPA.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # The app talks to the API on its own origin (proxied below). 'unsafe-inline'
    # for styles is required by the inline style attributes the UI uses (e.g.
    # progress-bar width); scripts stay locked to 'self'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/ {
        # Proxy to the backend service. BACKEND_URL must be set in environment variables.
        # We use a variable to force DNS resolution at runtime if needed, 
        # but here it's mainly for environment substitution.
        proxy_pass ${BACKEND_URL}/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
